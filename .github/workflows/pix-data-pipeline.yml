name: PIX Observatory — Data Pipeline

# Roda todo dia 15 do mês às 08:00 UTC
# O BACEN publica os dados ~17 dias após o fechamento do mês anterior.
# Também pode ser disparado manualmente via workflow_dispatch.
on:
  schedule:
    - cron: '0 8 15 * *'
  workflow_dispatch:
    inputs:
      force_full_reload:
        description: 'Forçar recarga completa desde nov/2020'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write   # Para commitar os Parquets atualizados
  actions: write    # Necessário para o createWorkflowDispatch (disparar build-and-deploy.yml)

jobs:
  ingest-and-transform:
    name: Ingestão + Transformação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r ingestion/requirements.txt

      - name: Criar diretórios de dados
        run: |
          mkdir -p data/bronze/spi_liquidados
          mkdir -p data/bronze/spi_disponibilidade
          mkdir -p data/bronze/spi_interrupcoes
          mkdir -p data/bronze/dict_chaves
          mkdir -p data/bronze/dict_participantes
          mkdir -p data/bronze/chaves_pix_participante
          mkdir -p data/bronze/usuarios_dict
          mkdir -p data/bronze/transacoes_municipio
          mkdir -p data/bronze/fraudes_pix
          mkdir -p data/silver
          mkdir -p data/gold

      - name: Ingestão Bronze — SPI
        run: python ingestion/ingest_spi.py

      - name: Ingestão Bronze — DICT
        run: python ingestion/ingest_dict.py

      - name: Transformações Bronze → Silver → Gold
        run: python ingestion/transform.py

      - name: Coletar notícias recentes do PIX
        run: python ingestion/fetch_news.py

      - name: Construir ranking de instituições (chaves DICT)
        run: python ingestion/ingest_ranking.py

      - name: Coletar usuários cadastrados (série histórica)
        run: python ingestion/ingest_usuarios.py

      - name: Construir ranking de cidades PIX
        run: python ingestion/ingest_municipios.py

      - name: Coletar estatísticas de fraude e MED
        run: python ingestion/ingest_fraudes.py

      - name: Verificar KPIs gerados
        run: |
          if [ -f data/gold/pix_kpis.json ]; then
            echo "✅ KPIs gerados:"
            cat data/gold/pix_kpis.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(f'  Total transações: {d.get(\"total_transacoes\", \"N/A\"):,.0f}')
          print(f'  Período: {d.get(\"primeiro_dia\", \"N/A\")} → {d.get(\"ultimo_dia\", \"N/A\")}')
          print(f'  Fator crescimento: {d.get(\"fator_crescimento\", \"N/A\")}×')
          "
          else
            echo "⚠ pix_kpis.json não foi gerado"
          fi

      - name: Commit dados atualizados
        run: |
          git config user.name "pix-pipeline[bot]"
          git config user.email "pix-pipeline@users.noreply.github.com"

          # Apenas arquivos de dados, gold JSON e os JSONs de frontend
          git add data/bronze/ data/silver/ data/gold/ \
                  assets/data/pix_news.json assets/data/pix_ranking.json \
                  assets/data/pix_usuarios.json assets/data/pix_municipios.json \
                  assets/data/pix_fraudes.json || true

          # Só commita se houver mudanças
          if git diff --staged --quiet; then
            echo "ℹ Sem mudanças nos dados — nada a commitar."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "data: atualização automática PIX Observatory ${TODAY}"
            git push
            echo "✅ Dados commitados e enviados."
          fi

      - name: Disparar deploy do site
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('✅ Deploy disparado.');
