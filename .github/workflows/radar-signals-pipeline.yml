name: Data Stack Radar BR — Sinais GitHub + PyPI

# Dia 1 de cada mês às 03:00 UTC, conforme spec do projeto.
# Também pode ser disparado manualmente via workflow_dispatch.
on:
  schedule:
    - cron: '20 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write   # Necessário para o createWorkflowDispatch (disparar build-and-deploy.yml)

jobs:
  collect-signals:
    name: Coleta GitHub + PyPI + gold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion_radar/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r ingestion_radar/requirements.txt

      - name: Criar diretórios de dados
        run: |
          mkdir -p data/bronze/radar_github data/bronze/radar_pypi data/silver data/gold

      - name: Coletar sinais GitHub (topic search, 14 ferramentas)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ingestion_radar/collect_github.py

      - name: Coletar sinais PyPI Stats (11 pacotes)
        run: python ingestion_radar/collect_pypi.py

      - name: Silver — consolidar sinais GitHub + PyPI
        run: python transform_radar/silver_signals.py

      - name: Gold — recalcular scores do radar
        run: python transform_radar/gold_radar.py

      - name: Commit dados atualizados
        run: |
          git config user.name "radar-pipeline[bot]"
          git config user.email "radar-pipeline@users.noreply.github.com"

          git add data/bronze/radar_github/ data/bronze/radar_pypi/ data/silver/ data/gold/ \
                  assets/data/radar_scores.json assets/data/radar_trending.json || true

          if git diff --staged --quiet; then
            echo "ℹ Sem mudanças nos dados — nada a commitar."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "data: coleta mensal GitHub+PyPI — Data Stack Radar BR ${TODAY}"
            # Push resiliente: reconcilia com origin/main preferindo os dados
            # recém-gerados (resolve até parquet binário) e re-tenta.
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                echo "✅ Dados enviados (tentativa ${attempt})."
                break
              fi
              if [ "${attempt}" = "5" ]; then
                echo "✗ Push falhou após 5 tentativas."; exit 1
              fi
              echo "↻ Push rejeitado — reconciliando com origin/main (tentativa ${attempt})."
              git fetch origin main
              git merge -X ours --no-edit FETCH_HEAD || {
                git checkout --ours . && git add -A && GIT_EDITOR=true git commit --no-edit || true
              }
              sleep $(( attempt * 3 ))
            done
          fi

      - name: Disparar deploy do site
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('✅ Deploy disparado.');
