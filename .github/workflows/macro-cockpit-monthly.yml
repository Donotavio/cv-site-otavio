name: Brasil Cockpit — Coleta mensal (SGS)

# Dia 28 de cada mês às 06:00 UTC. Preços, juros (Selic), externo (reservas,
# comércio), fiscal (dívida, resultado primário). silver+gold reconstrói.
on:
  schedule:
    - cron: '0 6 28 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  collect-monthly:
    name: SGS → silver → gold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion_macro/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r ingestion_macro/requirements.txt

      - name: Criar diretórios de dados
        run: mkdir -p data/bronze/macro_sgs data/silver data/gold

      - name: Coletar BACEN SGS (preços, juros, externo, fiscal)
        run: python ingestion_macro/collect_sgs.py

      - name: Silver — consolidar Bronze → Silver
        run: python transform_macro/silver_macro.py

      - name: Gold — recalcular cockpit + histórico
        run: python transform_macro/gold_cockpit.py

      - name: Commit dados atualizados
        run: |
          git config user.name "macro-cockpit[bot]"
          git config user.email "macro-cockpit@users.noreply.github.com"

          git add data/bronze/macro_sgs/ data/silver/ data/gold/ \
                  assets/data/cockpit.json assets/data/historico.json || true

          if git diff --staged --quiet; then
            echo "ℹ Sem mudanças nos dados — nada a commitar."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "data: coleta mensal SGS — Brasil Cockpit ${TODAY}"
            # Usa merge (não rebase) para evitar conflito irrecuperável em
            # binários regenerados (ex.: data/gold/historico.parquet).
            # Em caso de conflito de conteúdo, prioriza a versão local
            # recém-reconstruída (gold é full rebuild) e conclui o merge.
            git pull --no-rebase || {
              echo "⚠ Conflito no pull — resolvendo com versão local (full rebuild)."
              git checkout --ours data/gold/historico.parquet || true
              git add data/gold/historico.parquet || true
              git commit --no-edit || true
            }
            git push
            echo "✅ Dados commitados e enviados."
          fi

      - name: Disparar deploy do site
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('✅ Deploy disparado.');
