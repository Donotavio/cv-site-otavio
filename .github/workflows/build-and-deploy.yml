name: Build and Deploy (Astro)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Necessário para fazer push do build para a branch gh-pages
permissions:
  contents: write

# Cancela deploy em progresso se novo push chegar
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      # O deploy via branch roda Jekyll por padrão, o que excluiria os
      # arquivos em _astro/. .nojekyll desativa o Jekyll e serve tudo cru.
      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA:0:7}"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
