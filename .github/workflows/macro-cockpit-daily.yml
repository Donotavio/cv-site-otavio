name: Brasil Cockpit — Coleta diária (PTAX + Mercado)

# Dias úteis às 13:00 UTC (após fechamento da PTAX ~16h Brasília) + manual.
# Coleta câmbio (USD/EUR) e Ibovespa; silver+gold reconstrói o cockpit.
on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  collect-daily:
    name: PTAX + Mercado → silver → gold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion_macro/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r ingestion_macro/requirements.txt

      - name: Criar diretórios de dados
        run: mkdir -p data/bronze/macro_ptax data/bronze/macro_market data/silver data/gold

      - name: Coletar PTAX (USD, EUR)
        run: python ingestion_macro/collect_ptax.py

      - name: Coletar mercado (Ibovespa via yfinance)
        run: python ingestion_macro/collect_market.py

      - name: Silver — consolidar Bronze → Silver
        run: python transform_macro/silver_macro.py

      - name: Gold — recalcular cockpit + histórico
        run: python transform_macro/gold_cockpit.py

      - name: Commit dados atualizados
        run: |
          git config user.name "macro-cockpit[bot]"
          git config user.email "macro-cockpit@users.noreply.github.com"

          git add data/bronze/macro_ptax/ data/bronze/macro_market/ \
                  data/silver/ data/gold/ \
                  assets/data/cockpit.json assets/data/historico.json || true

          if git diff --staged --quiet; then
            echo "ℹ Sem mudanças nos dados — nada a commitar."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "data: coleta diária PTAX+Mercado — Brasil Cockpit ${TODAY}"
            # Push resiliente: se a remota avançou (outro pipeline empurrou no
            # mesmo horário), reconcilia preferindo os dados recém-gerados (o
            # gold é full rebuild → fonte de verdade) — resolve inclusive
            # conflito em parquet binário — e re-tenta o push.
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                echo "✅ Dados enviados (tentativa ${attempt})."
                break
              fi
              if [ "${attempt}" = "5" ]; then
                echo "✗ Push falhou após 5 tentativas."; exit 1
              fi
              echo "↻ Push rejeitado — reconciliando com origin/main (tentativa ${attempt})."
              git fetch origin main
              git merge -X ours --no-edit FETCH_HEAD || {
                git checkout --ours . && git add -A && GIT_EDITOR=true git commit --no-edit || true
              }
              sleep $(( attempt * 3 ))
            done
          fi

      - name: Disparar deploy do site
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('✅ Deploy disparado.');
