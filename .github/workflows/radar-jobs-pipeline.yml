name: Data Stack Radar BR — Coleta de vagas

# Toda segunda-feira às 02:00 UTC, conforme spec do projeto.
# Também pode ser disparado manualmente via workflow_dispatch.
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect-jobs:
    name: Coleta de vagas (Gupy + Greenhouse) + skills + gold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion_radar/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r ingestion_radar/requirements.txt

      - name: Criar diretórios de dados
        run: |
          mkdir -p data/bronze/radar_jobs data/bronze/radar_jobs_greenhouse data/silver data/gold

      - name: Coletar vagas (Gupy — 8 termos de busca)
        run: python ingestion_radar/collect_jobs.py

      - name: Coletar vagas (Greenhouse — 11 empresas BR/LatAm curadas)
        run: python ingestion_radar/collect_jobs_greenhouse.py

      - name: Silver — extrair skills por semana (Gupy + Greenhouse)
        run: python transform_radar/silver_jobs.py

      - name: Gold — análise de vagas (remoto/cidade/senioridade/skills/fonte)
        run: python transform_radar/gold_jobs_analysis.py

      - name: Gold — recalcular scores do radar (job_score muda toda semana)
        run: python transform_radar/gold_radar.py

      - name: Gold — insights extras (vagas recentes, empresas, combos, salário)
        run: python transform_radar/gold_insights.py

      - name: Commit dados atualizados
        run: |
          git config user.name "radar-pipeline[bot]"
          git config user.email "radar-pipeline@users.noreply.github.com"

          git add data/bronze/radar_jobs/ data/bronze/radar_jobs_greenhouse/ data/silver/ data/gold/ \
                  assets/data/radar_scores.json assets/data/radar_trending.json \
                  assets/data/radar_jobs_analysis.json assets/data/radar_insights.json || true

          if git diff --staged --quiet; then
            echo "ℹ Sem mudanças nos dados — nada a commitar."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "data: coleta semanal de vagas — Data Stack Radar BR ${TODAY}"
            git push
            echo "✅ Dados commitados e enviados."
          fi

      - name: Disparar deploy do site
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('✅ Deploy disparado.');
