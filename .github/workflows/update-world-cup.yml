name: World Cup Dashboard — Data Pipeline

# A cada hora, das 13h às 00h (meia-noite) no Horário de Brasília (UTC-3).
# Em UTC isso equivale às 16h–03h (do dia seguinte). Janela completa dos
# jogos da Copa 2026 (sedes EUA/Canadá/México), do 1º jogo (horário de
# Los Angeles) até o fim do último jogo da Costa Leste.
#
# Conversão UTC ↔ BRT (UTC-3):
#   16:00 UTC = 13:00 BRT   ← 1º jogo do dia (horário de Los Angeles)
#   ...
#   03:00 UTC = 00:00 BRT   ← fim da janela (após último jogo)
#
# Roda até o fim da Copa (19/07/2026). Após isso, desativar manualmente.
#
# `workflow_dispatch` permite rodar manualmente (útil para validar).
on:
  schedule:
    - cron: '0 16-23,0-3 * * *'
  workflow_dispatch: {}

# Cancela runs horárias sobrepostas (evita race condition no git push
# se um job atrasar). Schedule em group próprio por branch.
concurrency:
  group: worldcup-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # commita os JSONs atualizados
  actions: write    # dispara o build-and-deploy.yml

jobs:
  scrape:
    name: Coleta + Publicação JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion_worldcup/requirements.txt

      - name: Instalar dependências
        run: pip install -r ingestion_worldcup/requirements.txt

      - name: Executar scraper (Openfootball + RSS + cálculo Elo)
        run: python ingestion_worldcup/scraper.py

      - name: Executar ball-level data (momentum + FBref best-effort)
        run: python ingestion_worldcup/fetch_ball_level.py

      - name: Verificar JSONs gerados
        run: |
          echo "📄 Arquivos em assets/data/worldcup/:"
          ls -lh assets/data/worldcup/*.json 2>/dev/null || echo "  ⚠ Nenhum JSON encontrado."
          echo
          echo "🏆 Top 5 artilheiros:"
          python3 -c "
          import json
          try:
              d = json.load(open('assets/data/worldcup/artilheiros.json'))
              for s in d['scorers'][:5]:
                  print(f\"  {s['team']['flag']} {s['name']} — {s['goals']} gols ({s['team']['code']})\")
          except Exception as e:
              print(f'  (não foi possível ler artilheiros.json: {e})')
          " || true

      - name: Commit dados atualizados
        run: |
          git config user.name "worldcup-pipeline[bot]"
          git config user.email "worldcup-pipeline@users.noreply.github.com"

          # Apenas os 6 JSONs do dashboard (o scraper já evita reescrever
          # se o conteúdo não mudou — updated_at é ignorado no diff interno).
          git add assets/data/worldcup/ || true

          if git diff --staged --quiet; then
            echo "ℹ Sem mudanças nos dados — nada a commitar."
          else
            NOW=$(date -u +%Y-%m-%dT%H:%MZ)
            git commit -m "data: atualização automática World Cup Dashboard ${NOW}"
            # Push resiliente: reconcilia com origin/main preferindo os dados
            # recém-gerados e re-tenta (evita corrida com os outros pipelines).
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                echo "✅ Dados enviados (tentativa ${attempt})."
                break
              fi
              if [ "${attempt}" = "5" ]; then
                echo "✗ Push falhou após 5 tentativas."; exit 1
              fi
              echo "↻ Push rejeitado — reconciliando com origin/main (tentativa ${attempt})."
              git fetch origin main
              git merge -X ours --no-edit FETCH_HEAD || {
                git checkout --ours . && git add -A && GIT_EDITOR=true git commit --no-edit || true
              }
              sleep $(( attempt * 3 ))
            done
          fi

      - name: Disparar deploy do site
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('✅ Deploy disparado.');
