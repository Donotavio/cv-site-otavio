name: Brasil Cockpit — Coleta trimestral (IBGE)

# Dias 15 de jan/abr/jul/out às 06:00 UTC (garante publicação da PNAD Contínua
# trimestral). silver+gold reconstrói o cockpit.
on:
  schedule:
    - cron: '0 6 15 1,4,7,10 *'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  collect-quarterly:
    name: IBGE (PNAD) → silver → gold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion_macro/requirements.txt

      - name: Instalar dependências Python
        run: pip install -r ingestion_macro/requirements.txt

      - name: Criar diretórios de dados
        run: mkdir -p data/bronze/macro_ibge data/silver data/gold

      - name: Coletar IBGE SIDRA (PNAD Contínua — desocupação)
        run: python ingestion_macro/collect_ibge.py

      - name: Silver — consolidar Bronze → Silver
        run: python transform_macro/silver_macro.py

      - name: Gold — recalcular cockpit + histórico
        run: python transform_macro/gold_cockpit.py

      - name: Commit dados atualizados
        run: |
          git config user.name "macro-cockpit[bot]"
          git config user.email "macro-cockpit@users.noreply.github.com"

          git add data/bronze/macro_ibge/ data/silver/ data/gold/ \
                  assets/data/cockpit.json assets/data/historico.json || true

          if git diff --staged --quiet; then
            echo "ℹ Sem mudanças nos dados — nada a commitar."
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "data: coleta trimestral IBGE — Brasil Cockpit ${TODAY}"
            git pull --rebase
            git push
            echo "✅ Dados commitados e enviados."
          fi

      - name: Disparar deploy do site
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-deploy.yml',
              ref: 'main'
            });
            console.log('✅ Deploy disparado.');
